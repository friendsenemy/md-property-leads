name: Daily Scrape Trigger

on:
  schedule:
    # Run at 6:00 AM EST (11:00 UTC) every day
    - cron: '0 11 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  trigger-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render service and trigger scrape
        run: |
          # First hit the homepage to wake up the service
          echo "Waking up service..."
          curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_URL }}/ || true
          sleep 10
          # Trigger the scrape
          echo "Triggering daily scrape..."
          curl -s -X POST ${{ secrets.RENDER_URL }}/api/scrape/start \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n"
